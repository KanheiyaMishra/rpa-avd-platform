# ============================================================
# ADMIN WORKFLOW — Deploy Full AVD Platform Infrastructure
# Scope: Network (VNet, Subnet, NSG, Route Table) + Hub RG + AVD Resources + Gallery + Spoke RG + Association
#
# Who runs this: Platform/Infrastructure admins only
# When: First-time setup or infrastructure changes
# Protection: Requires 'infra-admin' GitHub Environment approval
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID        - Service principal / federated app client ID
#   AZURE_TENANT_ID        - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  - Target subscription
#
# Required GitHub Environment variables (set per environment in repo settings):
#   LOCATION               - Azure region (e.g. eastus2)
#   HOST_POOL_NAME         - Host pool name (e.g. hp-demo)
#   WORKSPACE_NAME         - AVD workspace name (e.g. ws-demo)
#   GALLERY_NAME           - Compute gallery name (e.g. acg_avd_dev)
#   SPOKE_RG_NAME          - Spoke resource group name (e.g. rg-avd-spoke-demo)
#   VNET_NAME              - Virtual network name (e.g. vnet-avd-demo)
#   SUBNET_NAME            - Subnet name (e.g. avd-subnet)
#   NSG_NAME               - Network security group name (e.g. avd-nsg)
# ============================================================

name: 🏗️ Deploy AVD Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      what_if:
        description: 'Dry-run (What-If) — preview changes without deploying'
        type: boolean
        default: true

permissions:
  id-token: write   # Required for OIDC login
  contents: read

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint — Hub main.bicep
        run: az bicep build --file platform/hub/main.bicep

      - name: Lint — avd-resources.bicep
        run: az bicep build --file platform/hub/avd-resources.bicep

      - name: Lint — gallery.bicep
        run: az bicep build --file platform/hub/gallery.bicep

      - name: Lint — association.bicep
        run: az bicep build --file platform/hub/association.bicep

      - name: Lint — spoke/rg.bicep
        run: az bicep build --file platform/spoke/rg.bicep

      - name: Lint — network/vnet.bicep
        run: az bicep build --file platform/network/vnet.bicep

  what-if:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.what_if == true
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If — Hub Resource Group
        run: |
          az deployment sub what-if \
            --location ${{ vars.LOCATION }} \
            --template-file platform/hub/main.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         hostPoolName=${{ vars.HOST_POOL_NAME }}

      - name: What-If — Spoke Resource Group
        run: |
          az deployment sub what-if \
            --location ${{ vars.LOCATION }} \
            --template-file platform/spoke/rg.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         resourceGroupName=${{ vars.SPOKE_RG_NAME }}

      - name: What-If — Network Infrastructure
        run: |
          az deployment group what-if \
            --resource-group ${{ vars.SPOKE_RG_NAME }} \
            --template-file platform/network/vnet.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         vnetName=${{ vars.VNET_NAME }} \
                         subnetName=${{ vars.SUBNET_NAME }} \
                         nsgName=${{ vars.NSG_NAME }}

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: inputs.what_if == false
    environment: ${{ inputs.environment }}  # <-- GitHub Environment approval gate here
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step 1: Spoke Resource Group (needed first for network)
      - name: Deploy Spoke Resource Group
        run: |
          az deployment sub create \
            --name "spoke-rg-${{ github.run_id }}" \
            --location ${{ vars.LOCATION }} \
            --template-file platform/spoke/rg.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         resourceGroupName=${{ vars.SPOKE_RG_NAME }}

      # Step 2: Network Infrastructure (VNet, Subnet, NSG, Route Table)
      - name: Deploy Network Infrastructure
        run: |
          az deployment group create \
            --name "network-${{ github.run_id }}" \
            --resource-group ${{ vars.SPOKE_RG_NAME }} \
            --template-file platform/network/vnet.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         vnetName=${{ vars.VNET_NAME }} \
                         subnetName=${{ vars.SUBNET_NAME }} \
                         nsgName=${{ vars.NSG_NAME }}

      - name: Set Subnet ID
        id: network
        run: |
          SUBNET_ID=$(az deployment group show \
            --name "network-${{ github.run_id }}" \
            --resource-group ${{ vars.SPOKE_RG_NAME }} \
            --query properties.outputs.subnetId.value -o tsv)
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT

      # Step 3: Hub Resource Group
      - name: Deploy Hub Resource Group
        run: |
          az deployment sub create \
            --name "hub-rg-${{ github.run_id }}" \
            --location ${{ vars.LOCATION }} \
            --template-file platform/hub/main.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         hostPoolName=${{ vars.HOST_POOL_NAME }}

      - name: Set Hub RG name
        id: hub-rg
        run: |
          RG_NAME=$(az deployment sub show \
            --name "hub-rg-${{ github.run_id }}" \
            --query properties.outputs.rgName.value -o tsv)
          echo "name=$RG_NAME" >> $GITHUB_OUTPUT

      # Step 4: Azure Compute Gallery
      - name: Deploy Azure Compute Gallery + Image Definitions
        run: |
          az deployment group create \
            --name "gallery-${{ github.run_id }}" \
            --resource-group ${{ steps.hub-rg.outputs.name }} \
            --template-file platform/hub/gallery.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         galleryName=${{ vars.GALLERY_NAME }}

      # Step 5: AVD Resources (Host Pools, Workspace, App Groups)
      - name: Deploy AVD Resources
        run: |
          az deployment group create \
            --name "avd-resources-${{ github.run_id }}" \
            --resource-group ${{ steps.hub-rg.outputs.name }} \
            --template-file platform/hub/avd-resources.bicep \
            --parameters location=${{ vars.LOCATION }} \
                         hostPoolName=${{ vars.HOST_POOL_NAME }} \
                         workspaceName=${{ vars.WORKSPACE_NAME }}

      # Step 6: Associate App Group → Workspace
      - name: Associate App Group to Workspace
        run: |
          az deployment group create \
            --name "assoc-${{ github.run_id }}" \
            --resource-group ${{ steps.hub-rg.outputs.name }} \
            --template-file platform/hub/association.bicep \
            --parameters hostPoolName=${{ vars.HOST_POOL_NAME }} \
                         workspaceName=${{ vars.WORKSPACE_NAME }} \
                         location=${{ vars.LOCATION }}

      - name: Deployment Summary
        run: |
          echo "## ✅ Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Hub RG | ${{ steps.hub-rg.outputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spoke RG | ${{ vars.SPOKE_RG_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gallery | ${{ vars.GALLERY_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Host Pool | ${{ vars.HOST_POOL_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | ${{ vars.WORKSPACE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
